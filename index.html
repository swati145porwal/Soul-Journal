
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Soul Journal</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=Journal&backgroundColor=D97706">
    <link rel="preconnect" href="https://images.unsplash.com">
    <meta name="theme-color" content="#FFFDF5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Soul Journal">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Quicksand', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              brand: {
                primary: '#D97706', // Warm Sunset Amber
                secondary: '#92400E', // Earthy Brown
                accent: '#FCD34D', // Sunbeam Yellow
                bg: '#FFFDF5', // Warm Linen
                dark: '#2D1B08', // Coffee Bean
                light: '#FEF3C7',
                clay: '#B45309',
                soft: '#FAF5F0'
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'bounce-short': 'bounceShort 2s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              bounceShort: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      body {
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        background-color: #FFFDF5;
        overflow: hidden;
        font-family: 'Quicksand', sans-serif;
      }
      input, textarea { user-select: text; }
      
      @keyframes softFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .animate-float { animation: softFloat 5s ease-in-out infinite; }
      
      button, a { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
      
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .custom-scrollbar::-webkit-scrollbar {
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #F1F5F9;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #D97706;
        border-radius: 10px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "d3": "https://esm.sh/d3@^7.9.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="text-brand-dark antialiased overscroll-none selection:bg-brand-primary/20">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
